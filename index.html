<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>初中英语通关游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Comic Sans MS', '幼圆', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px;
        }
        .game-container {
            width: 100%; max-width: 700px; background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px); border-radius: 40px; padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3); text-align: center;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; color: white; font-weight: bold; font-size: 1.1rem; background: rgba(0,0,0,0.2); border-radius: 50px; padding: 8px 20px; }
        .lives { color: #ffd700; font-size: 1.4rem; }
        .score { background: #f39c12; padding: 5px 15px; border-radius: 20px; color: white; }
        .stars { color: #f1c40f; font-size: 1.3rem; }
        .progress-bar { width: 100%; height: 12px; background: #ddd; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: #2ecc71; border-radius: 10px; transition: width 0.4s; }
        .timer { font-size: 1.8rem; font-weight: bold; color: #e74c3c; margin: 10px 0; }
        .dino { font-size: 4rem; }
        .question-area { background: #fef9e7; border-radius: 25px; padding: 20px; margin: 10px 0; min-height: 140px; display: flex; flex-direction: column; justify-content: center; }
        .question-text { font-size: 1.5rem; font-weight: bold; color: #2c3e50; margin-bottom: 8px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .option-btn { background: #f9f9f9; border: 3px solid #bdc3c7; border-radius: 20px; padding: 18px 10px; font-size: 1.1rem; font-weight: bold; color: #2c3e50; cursor: pointer; transition: 0.15s; word-break: break-word; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .option-btn:hover { transform: translateY(-3px); border-color: #3498db; background: #eaf2f8; }
        .option-btn.correct { background: #2ecc71; border-color: #27ae60; color: white; }
        .option-btn.wrong { background: #e74c3c; border-color: #c0392b; color: white; }
        .option-btn:disabled { pointer-events: none; opacity: 0.8; }
        .feedback-msg { font-size: 1rem; font-weight: bold; margin-top: 10px; min-height: 30px; white-space: pre-wrap; color: #2c3e50; line-height: 1.5; padding: 8px; border-radius: 12px; }
        .feedback-msg.explain { background: #eaf6ff; border: 2px solid #3498db; text-align: left; }
        .btn { background: #3498db; color: white; border: none; border-radius: 50px; padding: 15px 35px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; margin: 5px; box-shadow: 0 5px 0 #1f618d; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #1f618d; }
        .start-btn { background: #e67e22; box-shadow: 0 5px 0 #b85c0c; font-size: 1.5rem; }
        .world-card { background: #fff3cd; border-radius: 25px; padding: 15px; margin: 10px; cursor: pointer; transition: 0.2s; border: 3px solid #f39c12; font-weight: bold; display: inline-block; width: 28%; min-width: 100px; }
        .world-card:hover { background: #ffeaa7; transform: scale(1.03); }
        .world-icon { font-size: 2.5rem; }
        .certificate { background: #fef9e7; border: 8px double #f1c40f; border-radius: 30px; padding: 20px; margin: 15px 0; }
        .daily-progress { font-size: 2rem; margin: 15px 0; }
        .goal-select { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .goal-btn { background: #2ecc71; color: white; border: none; border-radius: 20px; padding: 10px 18px; font-size: 1.1rem; cursor: pointer; }
        .review-item { background: #fff3cd; border-radius: 15px; padding: 12px; margin: 8px 0; text-align: left; font-size: 0.95rem; line-height: 1.6; }
        .review-q { font-weight: bold; color: #2c3e50; margin-bottom: 4px; }
        .review-wrong { color: #e74c3c; }
        .review-correct { color: #27ae60; }
        .review-explain { color: #2c3e50; margin-top: 4px; font-size: 0.9rem; }
        .review-scroll { max-height: 50vh; overflow-y: auto; text-align: left; padding: 5px; }
        .review-label { background: #e74c3c; color: white; border-radius: 20px; padding: 3px 10px; font-size: 0.85rem; }
        .cat-tag { display: inline-block; background: #3498db; color: white; border-radius: 12px; padding: 2px 10px; font-size: 0.75rem; margin: 2px; }
        @media (max-width: 500px) { .options { grid-template-columns: 1fr; } .world-card { width: 80%; } .question-text { font-size: 1.3rem; } .option-btn { padding: 14px 10px; font-size: 1rem; } }
    </style>
</head>

    (function() {
        // ===== 音频系统（微信/安卓/iOS 全兼容）=====
        let _audioCtx = null;
        let _soundEnabled = true; // 默认开启声音
        let _ttsAudio = null;

        function getAudioCtx() {
            if (!_audioCtx) {
                _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (_audioCtx.state === 'suspended') _audioCtx.resume();
            return _audioCtx;
        }

        function playSound(type) {
            if (!_soundEnabled) return;
            try {
                const ctx = getAudioCtx();
                if (ctx.state === 'suspended') { ctx.resume(); }
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                gain.gain.setValueAtTime(0.4, ctx.currentTime);
                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523, ctx.currentTime);
                    osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
                    osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.4);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(150, ctx.currentTime + 0.3);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
                    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.35);
                }
            } catch(e) {}
        }

        // 首次触摸时解锁AudioContext（移动端必须）
        function unlockAudio() {
            try { getAudioCtx(); } catch(e) {}
        }
        ['touchstart', 'touchend', 'click', 'pointerdown'].forEach(evt => {
            document.addEventListener(evt, unlockAudio, { once: true });
        });

        // ===== 语音朗读：audio元素 + 有道TTS（微信/安卓/iOS全兼容）=====
        function getTTSUrl(text) {
            return 'https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(text) + '&type=2';
        }

        function speakNow(text) {
            if (!text || !_soundEnabled) return;
            try {
                if (!_ttsAudio) {
                    _ttsAudio = new Audio();
                    _ttsAudio.preload = 'auto';
                }
                _ttsAudio.pause();
                _ttsAudio.src = getTTSUrl(text);
                _ttsAudio.play().catch(() => {
                    speakNowFallback(text);
                });
            } catch(e) {
                speakNowFallback(text);
            }
        }

        let _currentUtterance = null;
        let _speechKeepAlive = null;
        function speakNowFallback(text) {
            if (!('speechSynthesis' in window) || !text) return;
            const synth = window.speechSynthesis;
            clearInterval(_speechKeepAlive);
            synth.cancel();
            setTimeout(() => {
                try { getAudioCtx(); } catch(e) {}
                _currentUtterance = new SpeechSynthesisUtterance(text);
                _currentUtterance.lang = 'en-US';
                _currentUtterance.rate = 0.85;
                _currentUtterance.volume = 1.0;
                _speechKeepAlive = setInterval(() => {
                    if (synth.speaking) synth.resume();
                    else clearInterval(_speechKeepAlive);
                }, 300);
                _currentUtterance.onend = () => clearInterval(_speechKeepAlive);
                _currentUtterance.onerror = () => clearInterval(_speechKeepAlive);
                synth.speak(_currentUtterance);
            }, 100);
        }

            { scenario: "你想表达'我不明白'，说：", options: ["I'm not understand.", "I don't understand.", "I not understand.", "Not understand."], correct: 1, explanation: "I don't understand. 是正确表达" },
            { scenario: "问别人来自哪里：", options: ["Where you from?", "Where are you from?", "You from where?", "From where?"], correct: 1, explanation: "Where are you from? 是标准问法" },
            { scenario: "问别人多大年龄：", options: ["How old are you?", "How are you?", "What old you?", "Old you are?"], correct: 0, explanation: "How old are you? 询问年龄" },
            { scenario: "祝贺别人考试取得好成绩，你说：", options: ["I'm sorry.", "Congratulations!", "Thank you!", "Goodbye!"], correct: 1, explanation: "Congratulations! 用于祝贺" },
            { scenario: "看到别人不舒服，你问：", options: ["How are you?", "What's wrong?", "Where are you?", "Who are you?"], correct: 1, explanation: "What's wrong? 询问对方怎么了" },
            { scenario: "夸奖别人：'你的衣服很漂亮！'", options: ["You clothes beautiful!", "Your clothes are beautiful!", "Clothes beautiful!", "Beautiful clothes!"], correct: 1, explanation: "Your clothes are beautiful! 是完整句子" },
            { scenario: "别人说 'Congratulations!'，你回答：", options: ["Congratulations!", "Thank you!", "I'm sorry.", "Goodbye!"], correct: 1, explanation: "对祝贺的回应是 Thank you" }
        ];

        function shuffleArray(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

        function generateVocabQuestions(count) {
            const shuffled = [...ALL_WORDS].sort(() => Math.random() - 0.5).slice(0, count);
            return shuffled.map(word => {
                const correctCN = WORD_MEANING[word] || "(未知)";
                const distractors = [];
                const others = Object.keys(WORD_MEANING).filter(w => w !== word);
                while (distractors.length < 3) {
                    const r = others[Math.floor(Math.random() * others.length)];
                    const m = WORD_MEANING[r];
                    if (m && !distractors.includes(m) && m !== correctCN) distractors.push(m);
                }
                const options = shuffleArray([correctCN, ...distractors]);
                return { type: 'vocab', english: word, options, correct: options.indexOf(correctCN) };
            });
        }

        function generateGrammarQuestions(count) {
            return shuffleArray(GRAMMAR_QUESTIONS).slice(0, count);
        }

        function generateSpeakingQuestions(count) {
            return shuffleArray(SPEAKING_QUESTIONS).slice(0, count);
        }

        const TOTAL_LIVES = 3;
        const QUESTION_TIME = 30;
        const QUESTIONS_PER_ROUND = 15;

        let state = {
            screen: 'start', currentWorld: null, questions: [], currentIndex: 0,
            score: 0, stars: 0, lives: TOTAL_LIVES, timerInterval: null,
            timeLeft: QUESTION_TIME, canAnswer: true,
            collectedStars: { vocab: 0, grammar: 0, speaking: 0 },
            totalStars: 0, feedback: '', currentCorrectCount: 0,
            dailyMode: false, dailyTarget: 0,
            wrongQuestions: [],
            isReviewMode: false
        };

        const STORAGE_KEY_TARGET = 'middle_english_daily_target';
        const STORAGE_KEY_PROGRESS = 'middle_english_daily_progress';
        const STORAGE_KEY_STREAK = 'middle_english_streak';

        function getTodayStr() { return new Date().toISOString().slice(0,10); }
        function getDailyTarget() { return parseInt(localStorage.getItem(STORAGE_KEY_TARGET)) || 0; }
        function setDailyTarget(n) { localStorage.setItem(STORAGE_KEY_TARGET, n); }
        function getDailyProgress() { const data = JSON.parse(localStorage.getItem(STORAGE_KEY_PROGRESS) || '{}'); return data[getTodayStr()] || 0; }
        function setDailyProgress(n) { const data = JSON.parse(localStorage.getItem(STORAGE_KEY_PROGRESS) || '{}'); data[getTodayStr()] = n; localStorage.setItem(STORAGE_KEY_PROGRESS, JSON.stringify(data)); }
        function getStreak() { return parseInt(localStorage.getItem(STORAGE_KEY_STREAK)) || 0; }
        function setStreak(n) { localStorage.setItem(STORAGE_KEY_STREAK, n); }

        function getExplanation(q, wrongIdx) {
            const correctAnswer = q.options[q.correct];
            const wrongAnswer = (wrongIdx !== undefined && wrongIdx >= 0) ? q.options[wrongIdx] : null;
            if (q.type === 'vocab') {
                let msg = '正确答案是"' + correctAnswer + '"。"' + q.english + '"的意思是"' + correctAnswer + '"';
                if (wrongAnswer) msg += '，不是"' + wrongAnswer + '"';
                return msg + '。';
            }
            if (q.type === 'grammar') {
                let msg = '正确答案是"' + correctAnswer + '"。';
                if (wrongAnswer) msg += '你选的"' + wrongAnswer + '"是错的，';
                if (q.explanation) msg += '\uD83D\uDCD6 ' + q.explanation;
                else msg += '请记住这个语法点。';
                return msg;
            }
            if (q.type === 'speaking') {
                let msg = '正确答案是"' + correctAnswer + '"。';
                if (wrongAnswer) msg += '"' + wrongAnswer + '"不是地道的表达，';
                if (q.explanation) msg += '\uD83D\uDCAC ' + q.explanation;
                else msg += '这是日常交际用语的正确表达方式。';
                return msg;
            }
            return '正确答案是"' + correctAnswer + '"。';
        }

        function getQuestionDisplay(q) {
            if (q.type === 'vocab') return '"' + q.english + '" 的中文意思是？';
            if (q.type === 'grammar') return q.question || '（题目缺失）';
            return q.scenario;
        }

        const container = document.getElementById('gameContainer');

        function render() {
            switch(state.screen) {
                case 'start': renderStart(); break;
                case 'selectWorld': renderWorldSelect(); break;
                case 'playing': renderPlaying(); break;
                case 'result': renderResult(); break;
                case 'daily': renderDaily(); break;
                case 'review': renderReview(); break;
            }
        }

        function renderStart() {
            const streak = getStreak();
            container.innerHTML = '<div class="dino">\uD83D\uDCDA</div>' +
                '<h1>初中英语通关游戏</h1>' +
                '<p>\uD83D\uDCDD词汇500+ | \uD83D\uDCD7语法75+ | \uD83D\uDCAC口语40+</p>' +
                '<br>' +
                '<button class="btn start-btn" onclick="game.startDaily()" style="background:#27ae60;box-shadow:0 5px 0 #1e8449;">\uD83D\uDCC5 每日打卡</button>' +
                '<button class="btn start-btn" style="background:#2980b9;box-shadow:0 5px 0 #1c5980;" onclick="game.startGame()">自由闯关 \uD83D\uDE80</button>' +
                '<p style="margin-top:15px;">\uD83D\uDD25 连续打卡 ' + streak + ' 天</p>';
        }

        function renderDaily() {
            const target = getDailyTarget();
            const progress = getDailyProgress();
            const streak = getStreak();
            if (!target) {
                container.innerHTML = '<h2>设定每日学习目标</h2><p>你想要每天学习多少个单词？</p><div class="goal-select">' + [5,10,15,20,30,40].map(n=>'<button class="goal-btn" onclick="game.setDailyGoal('+n+')">'+n+' 个</button>').join('') + '</div><button class="btn" onclick="game.goToStart()">返回</button>';
                return;
            }
            const done = progress >= target;
            container.innerHTML = '<h2>\uD83D\uDCC5 今日打卡</h2><p>目标：'+target+' 个单词</p><div class="daily-progress">\u2705 '+progress+' / '+target+'</div><div class="progress-bar"><div class="progress-fill" style="width:'+Math.min(100,(progress/target)*100)+'%;"></div></div><p>\uD83D\uDD25 已连续打卡 '+streak+' 天</p>'+(done?'<p style="color:green;font-size:1.5rem;">\uD83C\uDF89 今日目标已完成！</p>':'<button class="btn" onclick="game.startDailyVocab()">开始今日学习</button>')+'<button class="btn" onclick="game.goToStart()" style="background:#95a5a6;">返回首页</button><button class="btn" onclick="game.resetDaily()" style="background:#e74c3c;box-shadow:0 5px 0 #c0392b;">重新设定目标</button>';
        }

        function renderWorldSelect() {
            const s = state.collectedStars;
            container.innerHTML = '<h2>选择关卡</h2>' +
                '<div class="world-card" onclick="game.selectWorld(\'vocab\')">' +
                '<div class="world-icon">\uD83D\uDCDD</div><div>词汇乐园</div><div class="stars">' + '\u2B50'.repeat(s.vocab||0) + '</div></div>' +
                '<div class="world-card" onclick="game.selectWorld(\'grammar\')">' +
                '<div class="world-icon">\uD83D\uDCD7</div><div>语法挑战</div><div class="stars">' + '\u2B50'.repeat(s.grammar||0) + '</div></div>' +
                '<div class="world-card" onclick="game.selectWorld(\'speaking\')">' +
                '<div class="world-icon">\uD83D\uDCAC</div><div>口语实战</div><div class="stars">' + '\u2B50'.repeat(s.speaking||0) + '</div></div>' +
                '<br><button class="btn" onclick="game.goToStart()" style="background:#95a5a6;">返回首页</button>' +
                '<p>生命：' + '\u2764\uFE0F'.repeat(state.lives) + '</p>';
        }

        function renderPlaying() {
            const q = state.questions[state.currentIndex];
            if (!q) return;
            const progress = (state.currentIndex / state.questions.length) * 100;
            let html = '';
            const modeLabel = state.isReviewMode ? '\uD83D\uDD04错题重做' : (state.dailyMode ? '\uD83D\uDCC5每日打卡' : ({vocab:'\uD83D\uDCDD词汇',grammar:'\uD83D\uDCD7语法',speaking:'\uD83D\uDCAC口语'})[state.currentWorld]);

            if (q.type === 'vocab') html = '<div class="question-text">"' + q.english + '" 的中文意思是？</div>';
            else if (q.type === 'grammar') html = '<div class="question-text">' + (q.question || '（题目缺失）') + '</div>';
            else html = '<div class="question-text">' + q.scenario + '</div><button class="btn" id="btnReadScenario" style="font-size:1rem;padding:8px 20px;">\uD83D\uDD0A 听发音</button>';

            const opts = q.options.map((opt,i)=>'<button class="option-btn" data-action="answer" data-idx="'+i+'">'+opt+'</button>').join('');
            const feedbackClass = state.feedback && state.feedback.includes('\u274C') ? 'feedback-msg explain' : 'feedback-msg';
            container.innerHTML = '<div class="header">' +
                '<span class="lives">' + '\u2764\uFE0F'.repeat(state.lives) + '</span>' +
                '<span>'+modeLabel+'</span>' +
                '<span class="score">\u2B50 '+state.stars+'</span></div>' +
                '<div class="progress-bar"><div class="progress-fill" style="width:'+progress+'%;"></div></div>' +
                '<div class="timer">\u23F3 '+state.timeLeft+'</div>' +
                '<div class="question-area">'+html+'</div>' +
                '<div class="options">'+opts+'</div>' +
                '<div class="'+feedbackClass+'">'+(state.feedback||'')+'</div>';
        }

        function renderReview() {
            const wq = state.wrongQuestions;
            if (!wq.length) { renderResult(); return; }
            let reviewHtml = wq.map((item, i) => {
                const q = item.question;
                const qText = getQuestionDisplay(q);
                const correctAns = q.options[q.correct];
                const wrongAns = item.wrongAnswer;
                const explain = getExplanation(q, -1);
                return '<div class="review-item"><div class="review-q">'+(i+1)+'. '+qText+'</div><div class="review-wrong">\u274C 你选的：'+wrongAns+'</div><div class="review-correct">\u2705 正确答案：'+correctAns+'</div><div class="review-explain">'+(q.explanation||explain)+'</div></div>';
            }).join('');
            container.innerHTML = '<h2>\uD83D\uDCCB 错题回顾 <span class="review-label">'+wq.length+' 题</span></h2><div class="review-scroll">'+reviewHtml+'</div><button class="btn start-btn" onclick="game.startReviewRedo()">\uD83D\uDD04 重做错题</button><button class="btn" onclick="game.skipReview()">跳过</button>';
        }

        function renderResult() {
            const t = state.totalStars;
            let cert = t>=7?'<div class="certificate">\uD83C\uDF89 太棒了！你已掌握初中英语！</div>':(t>=4?'<div class="certificate">\uD83D\uDC4D 不错，继续加油！</div>':'<div class="certificate">\uD83D\uDCAA 多多练习，你会进步的！</div>');
            container.innerHTML = '<div class="dino">\uD83D\uDCDA\uD83C\uDF89</div><h2>闯关完成！</h2><p>总分：'+state.score+'</p><p>总星星：'+'\u2B50'.repeat(t)+' ('+t+'/9)</p>'+cert+'<button class="btn" onclick="game.restart()">再玩一次</button><button class="btn" onclick="game.goToStart()">返回首页</button>';
        }

        container.addEventListener('click', function(e) {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;
            const action = btn.getAttribute('data-action');
            if (action === 'answer') {
                const idx = parseInt(btn.getAttribute('data-idx'));
                answer(idx);
            }
        });

        document.addEventListener('click', function(e) {
            if (e.target.id === 'btnReadScenario' || e.target.closest('#btnReadScenario')) {
                const q = state.questions[state.currentIndex];
                if (q && q.type === 'speaking') {
                    unlockAudio();
                    speakNow(q.options[q.correct]);
                }
            }
        }, true);

        function startGame() {
            state.lives = TOTAL_LIVES; state.score=0; state.stars=0;
            state.collectedStars = { vocab:0, grammar:0, speaking:0 };
            state.totalStars=0; state.dailyMode=false; state.isReviewMode=false;
            state.wrongQuestions=[];
            state.screen='selectWorld'; render();
        }

        function startDaily() { state.screen='daily'; render(); }
        function setDailyGoal(n) { setDailyTarget(n); setDailyProgress(0); render(); }
        function resetDaily() { localStorage.removeItem(STORAGE_KEY_TARGET); localStorage.removeItem(STORAGE_KEY_PROGRESS); render(); }

        function startDailyVocab() {
            const target = getDailyTarget();
            if (!target) return;
            state.dailyMode = true; state.isReviewMode = false;
            state.currentWorld = 'vocab'; state.currentIndex = 0;
            state.currentCorrectCount = 0; state.canAnswer = true;
            state.feedback = ''; state.wrongQuestions = [];
            state.questions = generateVocabQuestions(target);
            state.screen = 'playing'; startTimer(); render();
        }

        function selectWorld(world) {
            state.dailyMode = false; state.isReviewMode = false;
            state.currentWorld=world; state.currentIndex=0; state.currentCorrectCount=0;
            state.canAnswer=true; state.feedback=''; state.wrongQuestions=[];
            if (world==='vocab') state.questions=generateVocabQuestions(QUESTIONS_PER_ROUND);
            else if (world==='grammar') state.questions=generateGrammarQuestions(QUESTIONS_PER_ROUND);
            else state.questions=generateSpeakingQuestions(Math.min(QUESTIONS_PER_ROUND, SPEAKING_QUESTIONS.length));
            state.screen='playing'; startTimer(); render();
        }

        function startTimer() {
            clearInterval(state.timerInterval); state.timeLeft=QUESTION_TIME;
            state.timerInterval = setInterval(() => {
                state.timeLeft--;
                const el = document.querySelector('.timer'); if(el) el.textContent = '\u23F3 '+state.timeLeft;
                if(state.timeLeft<=0) { clearInterval(state.timerInterval); if(state.canAnswer) handleTimeout(); }
            }, 1000);
        }

        function answer(idx) {
            if(!state.canAnswer) return;
            state.canAnswer=false; clearInterval(state.timerInterval);
            const q = state.questions[state.currentIndex];
            const correct = idx===q.correct;
            document.querySelectorAll('.option-btn').forEach((b,i)=>{
                b.disabled=true;
                if(i===q.correct) b.classList.add('correct');
                else if(i===idx && !correct) b.classList.add('wrong');
            });
            if(correct) {
                state.score+=10; state.stars++; state.currentCorrectCount++;
                state.feedback='\u2705 正确！ +10分'; playSound('correct');
                if(q.type==='vocab') speakNow(q.english);
                else speakNow(q.options[q.correct]);
            } else {
                state.lives--;
                state.wrongQuestions.push({ question: Object.assign({}, q), wrongAnswer: q.options[idx], wrongIdx: idx });
                state.feedback = '\u274C 错误！生命-1\n' + getExplanation(q, idx);
                playSound('wrong');
                speakNow(q.options[q.correct]);
            }
            const delay = correct ? 2000 : 3500;
            setTimeout(()=>{ if(state.lives<=0) gameOver(); else nextQuestion(); }, delay);
        }

        function handleTimeout() {
            state.canAnswer=false; state.lives--;
            const q = state.questions[state.currentIndex];
            state.wrongQuestions.push({ question: Object.assign({}, q), wrongAnswer: '（未作答）', wrongIdx: -1 });
            state.feedback = '\u23F0 时间到！生命-1\n' + getExplanation(q);
            playSound('wrong');
            const btn = document.querySelector('[data-idx="'+q.correct+'"]'); if(btn) btn.classList.add('correct');
            speakNow(q.options[q.correct]);
            setTimeout(()=>{ if(state.lives<=0) gameOver(); else nextQuestion(); }, 3500);
        }

        function nextQuestion() {
            state.currentIndex++;
            if(state.currentIndex >= state.questions.length) {
                if (state.dailyMode && !state.isReviewMode) finishDaily();
                else if (state.isReviewMode) finishReviewRedo();
                else finishWorld();
            } else { state.canAnswer=true; state.feedback=''; startTimer(); render(); }
        }

        function finishWorld() {
            clearInterval(state.timerInterval);
            const total=state.questions.length, correct=state.currentCorrectCount;
            let stars=0;
            if(correct===total) stars=3;
            else if(correct>=total*0.8) stars=2;
            else if(correct>=total*0.5) stars=1;
            state.collectedStars[state.currentWorld]=stars;
            state.totalStars=Object.values(state.collectedStars).reduce((a,b)=>a+b,0);
            if (state.wrongQuestions.length > 0) {
                state.screen = 'review'; render();
            } else {
                state.currentCorrectCount=0;
                const worldName = ({vocab:'\uD83D\uDCDD词汇乐园',grammar:'\uD83D\uDCD7语法挑战',speaking:'\uD83D\uDCAC口语实战'})[state.currentWorld];
                container.innerHTML = '<h2>'+worldName+' 完成！</h2><div style="font-size:2rem;">'+'\u2B50'.repeat(stars)+'</div><p>全部正确！\uD83C\uDF89 获得 '+stars+' 颗星</p><button class="btn" onclick="game.continueAdventure()">继续冒险</button>';
            }
        }

        function finishDaily() {
            clearInterval(state.timerInterval);
            const total = state.questions.length;
            const correct = state.currentCorrectCount;
            if (state.wrongQuestions.length > 0) {
                state.screen = 'review'; render();
                return;
            }
            completeDaily(total, correct);
        }

        function completeDaily(total, correct) {
            setDailyProgress(total);
            const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
            const progressData = JSON.parse(localStorage.getItem(STORAGE_KEY_PROGRESS) || '{}');
            const hasYesterday = progressData[yesterday] !== undefined;
            let streak = getStreak();
            if (getTodayStr() !== yesterday && hasYesterday) streak += 1;
            else if (!hasYesterday) streak = 1;
            setStreak(streak);
            state.dailyMode = false; state.isReviewMode = false;
            container.innerHTML = '<h2>\uD83D\uDCC5 今日打卡完成！</h2><p>学习了 '+total+' 个单词，答对 '+correct+' 题</p><p>\uD83D\uDD25 连续打卡 '+streak+' 天</p><button class="btn" onclick="game.goToStart()">返回首页</button><button class="btn" onclick="game.startDaily()">继续打卡</button>';
        }

        function startReviewRedo() {
            if (!state.wrongQuestions.length) return;
            const redoQuestions = state.wrongQuestions.map(item => {
                const origQ = item.question;
                const newOpts = shuffleArray(origQ.options);
                const newCorrect = newOpts.indexOf(origQ.options[origQ.correct]);
                return Object.assign({}, origQ, { options: newOpts, correct: newCorrect });
            });
            state.questions = redoQuestions;
            state.currentIndex = 0;
            state.currentCorrectCount = 0;
            state.canAnswer = true;
            state.feedback = '';
            state.wrongQuestions = [];
            state.isReviewMode = true;
            state.screen = 'playing';
            startTimer();
            render();
        }

        function finishReviewRedo() {
            clearInterval(state.timerInterval);
            if (state.wrongQuestions.length > 0) {
                state.screen = 'review';
                render();
            } else {
                if (state.dailyMode) {
                    completeDaily(state.questions.length, state.questions.length);
                } else {
                    const total = state.questions.length;
                    state.currentCorrectCount = 0;
                    state.isReviewMode = false;
                    container.innerHTML = '<h2>\uD83C\uDF89 错题全部做对！</h2><p>太棒了，继续加油！</p><button class="btn" onclick="game.continueAdventure()">继续冒险</button>';
                }
            }
        }

        function skipReview() {
            state.wrongQuestions = [];
            state.isReviewMode = false;
            if (state.dailyMode) {
                const total = state.questions.length;
                const correct = state.currentCorrectCount;
                completeDaily(total, correct);
            } else {
                const total = state.questions.length;
                const correct = total - state.wrongQuestions.length;
                let stars = 0;
                if(correct===total) stars=3;
                else if(correct>=total*0.8) stars=2;
                else if(correct>=total*0.5) stars=1;
                state.collectedStars[state.currentWorld] = stars;
                state.totalStars = Object.values(state.collectedStars).reduce((a,b)=>a+b,0);
                state.currentCorrectCount = 0;
                const worldName = ({vocab:'\uD83D\uDCDD词汇乐园',grammar:'\uD83D\uDCD7语法挑战',speaking:'\uD83D\uDCAC口语实战'})[state.currentWorld];
                container.innerHTML = '<h2>'+worldName+' 完成！</h2><div style="font-size:2rem;">'+'\u2B50'.repeat(stars)+'</div><p>正确 '+correct+'/'+total+' 题，获得 '+stars+' 颗星</p><button class="btn" onclick="game.continueAdventure()">继续冒险</button>';
            }
        }

        function continueAdventure() {
            if(state.lives<=0) { gameOver(); return; }
            const played = Object.values(state.collectedStars).filter(v=>v!==undefined).length;
            if(played>=3) { state.totalStars=Object.values(state.collectedStars).reduce((a,b)=>a+b,0); state.screen='result'; render(); }
            else { state.screen='selectWorld'; render(); }
        }

        function gameOver() {
            clearInterval(state.timerInterval);
            if (state.wrongQuestions.length > 0) {
                state.screen = 'review'; render();
                return;
            }
            state.totalStars=Object.values(state.collectedStars).reduce((a,b)=>a+b,0);
            container.innerHTML = '<div class="dino">\uD83D\uDE22</div><h2>生命耗尽</h2><p>总分：'+state.score+'</p><p>总星星：'+'\u2B50'.repeat(state.totalStars)+'</p><button class="btn" onclick="game.restart()">重新挑战</button>';
        }

        function goToStart() { clearInterval(state.timerInterval); state.screen='start'; render(); }
        function restart() { clearInterval(state.timerInterval); startGame(); }

        window.game = { startGame, startDaily, setDailyGoal, resetDaily, startDailyVocab, selectWorld, answer, continueAdventure, goToStart, restart, startReviewRedo, skipReview };

        // 首次交互时尝试解锁音频上下文
        try { getAudioCtx(); } catch(e) {}

        render();
    })();
</script>
